<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Регистрация — FreeDom</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== СТИЛИ (как в прошлой версии) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d17;
            color: #eae6f0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 1.8rem;
            color: #d4af37;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            opacity: 0.6;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            font-weight: 500;
            margin-bottom: 4px;
            color: #b8a9d4;
            font-size: 0.9rem;
        }
        .field input, .field select {
            width: 100%;
            padding: 10px 14px;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #eae6f0;
            font-family: inherit;
            transition: 0.3s;
        }
        .field input:focus, .field select:focus {
            border-color: rgba(212,175,55,0.2);
            outline: none;
            background: rgba(255,255,255,0.06);
        }
        .field input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(145deg, #d4af37, #b8952a);
            color: #0b0d17;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(212,175,55,0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.2);
            color: #ff6b6b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .success-msg {
            background: rgba(37,211,102,0.08);
            border: 1px solid rgba(37,211,102,0.15);
            color: #25D366;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .footer-link {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            opacity: 0.6;
        }
        .footer-link a {
            color: #d4af37;
            text-decoration: none;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
        .ref-hint {
            font-size: 0.8rem;
            color: #b8a9d4;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌿 FreeDom</h1>
        <div class="subtitle">Создайте аккаунт и получайте кэшбэк</div>

        <form id="registerForm">
            <div class="field">
                <label for="displayName">Имя и фамилия</label>
                <input type="text" id="displayName" placeholder="Иван Петров" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="ivan@mail.ru" required>
            </div>
            <div class="field">
                <label for="password">Пароль (мин. 6 символов)</label>
                <input type="password" id="password" placeholder="••••••" required>
            </div>
            <div class="field">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" placeholder="+7 999 123-45-67">
            </div>
            <div class="field">
                <label for="city">Город</label>
                <input type="text" id="city" placeholder="Сочи">
            </div>
            <div class="field">
                <label for="birthDate">Дата рождения</label>
                <input type="date" id="birthDate">
            </div>
            <div class="field">
                <label for="refCode">Промокод пригласившего (если есть)</label>
                <input type="text" id="refCode" placeholder="FD-12345">
                <div class="ref-hint">Если вас пригласил друг, введите его промокод</div>
            </div>

            <div id="errorMsg" class="error"></div>
            <div id="successMsg" class="success-msg">✅ Регистрация успешна! Перенаправляем...</div>

            <button type="submit" class="btn" id="submitBtn">Зарегистрироваться</button>
        </form>

        <div class="footer-link">
            Уже есть аккаунт? <a href="#" id="loginLink">Войти</a>
        </div>
    </div>

    <!-- Firebase SDK (модульный подход) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        // ===== ВАША КОНФИГУРАЦИЯ (уже вставлена) =====
        const firebaseConfig = {
            apiKey: "AIzaSyAK5KcbIHHcOon-pK9nskM0AKL5pdhwwQQ",
            authDomain: "freedom-referal.firebaseapp.com",
            projectId: "freedom-referal",
            storageBucket: "freedom-referal.firebasestorage.app",
            messagingSenderId: "189555481286",
            appId: "1:189555481286:web:870bc07acaa7d4c8b655c7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Элементы формы
        const form = document.getElementById('registerForm');
        const displayNameInput = document.getElementById('displayName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const phoneInput = document.getElementById('phone');
        const cityInput = document.getElementById('city');
        const birthDateInput = document.getElementById('birthDate');
        const refCodeInput = document.getElementById('refCode');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        // Автоподстановка промокода из URL
        const urlParams = new URLSearchParams(window.location.search);
        const refParam = urlParams.get('ref');
        if (refParam) refCodeInput.value = refParam;

        // Обработка отправки
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Регистрация...';

            const displayName = displayNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const phone = phoneInput.value.trim();
            const city = cityInput.value.trim();
            const birthDate = birthDateInput.value;
            const refCode = refCodeInput.value.trim();

            if (!displayName || !email || !password) {
                showError('Заполните имя, email и пароль.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
                return;
            }
            if (password.length < 6) {
                showError('Пароль должен быть не менее 6 символов.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
                return;
            }

            try {
                // 1. Создаём пользователя в Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Обновляем профиль (имя)
                await updateProfile(user, { displayName });

                // 3. Генерация уникального промокода
                const generatedRefCode = generateRefCode(displayName);

                // 4. Поиск пригласившего по промокоду
                let referredBy = '';
                if (refCode) {
                    const q = query(collection(db, 'users'), where('refCode', '==', refCode));
                    const snapshot = await getDocs(q);
                    if (!snapshot.empty) {
                        const docSnap = snapshot.docs[0];
                        referredBy = docSnap.id; // uid пригласившего
                    }
                }

                // 5. Сохраняем пользователя в Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    uid: user.uid,
                    email: user.email,
                    displayName: displayName,
                    phone: phone || '',
                    city: city || '',
                    birthDate: birthDate || '',
                    refCode: generatedRefCode,
                    referredBy: referredBy,
                    balance: 0,
                    totalEarned: 0,
                    registeredAt: serverTimestamp()
                });

                // 6. Если есть пригласивший — создаём запись в referrals (уровень 1)
                if (referredBy) {
                    await addDoc(collection(db, 'referrals'), {
                        referrerUid: referredBy,
                        refereeUid: user.uid,
                        level: 1,
                        createdAt: serverTimestamp()
                    });
                    // TODO: позже добавим логику для 2 и 3 уровня
                }

                // Успех
                successMsg.style.display = 'block';
                submitBtn.textContent = 'Готово!';
                submitBtn.disabled = true;
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 2000);

            } catch (error) {
                console.error('Ошибка:', error);
                let message = error.message;
                if (error.code === 'auth/email-already-in-use') {
                    message = 'Этот email уже зарегистрирован.';
                } else if (error.code === 'auth/weak-password') {
                    message = 'Слишком простой пароль.';
                }
                showError(message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Зарегистрироваться';
            }
        });

        function generateRefCode(displayName) {
            const namePart = displayName.replace(/[^a-zA-Zа-яА-Я]/g, '').slice(0, 4).toUpperCase() || 'USER';
            const randomPart = Math.floor(1000 + Math.random() * 9000);
            return `FD-${namePart}${randomPart}`;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        document.getElementById('loginLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
